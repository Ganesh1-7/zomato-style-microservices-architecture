version: "3.9"

services:
  user-service:
    build: ./backend/services/user-service
    container_name: user-service
    ports:
      - "3001:3000"
    restart: unless-stopped
    environment:
      - PORT=3000
    networks:
      - app-network

  restaurant-service:
    build: ./backend/services/restaurant-service
    container_name: restaurant-service
    ports:
      - "3002:3000"
    restart: unless-stopped
    environment:
      - PORT=3000
    networks:
      - app-network

  order-service:
    build: ./backend/services/order-service
    container_name: order-service
    ports:
      - "3003:3000"
    restart: unless-stopped
    environment:
      - PORT=3000
    networks:
      - app-network

  delivery-service:
    build: ./backend/services/delivery-service
    container_name: delivery-service
    ports:
      - "3004:3000"
    restart: unless-stopped
    environment:
      - PORT=3000
    networks:
      - app-network

  payment-service:
    build: ./backend/services/payment-service
    container_name: payment-service
    ports:
      - "3005:3000"
    restart: unless-stopped
    environment:
      - PORT=3000
    networks:
      - app-network

  gateway:
    image: nginx:alpine
    container_name: api-gateway
    ports:
      - "8080:80"
    volumes:
      - ./backend/gateway/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - user-service
      - restaurant-service
      - order-service
      - delivery-service
      - payment-service
    restart: unless-stopped
    networks:
      - app-network

  frontend:
    build: ./frontend
    container_name: zomato-frontend
    ports:
      - "80:80"
    depends_on:
      - gateway
    restart: unless-stopped
    networks:
      - app-network

  # --- MONITORING ---
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--web.enable-lifecycle'
    restart: unless-stopped
    networks:
      - app-network

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    ports:
      - "3000:3000"
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
      - grafana-data:/var/lib/grafana
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_SERVER_ROOT_URL=http://localhost:3000
    restart: unless-stopped
    networks:
      - app-network
    depends_on:
      - prometheus
      - loki

  loki:
    image: grafana/loki:latest
    container_name: loki
    ports:
      - "3100:3100"
    volumes:
      - ./monitoring/loki/loki.yml:/etc/loki/local-config.yaml:ro
      - loki-data:/loki
    command: -config.file=/etc/loki/local-config.yaml
    restart: unless-stopped
    networks:
      - app-network

  promtail:
    image: grafana/promtail:latest
    container_name: promtail
    volumes:
      - ./monitoring/promtail/promtail.yml:/etc/promtail/config.yml:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
    command: -config.file=/etc/promtail/config.yml
    restart: unless-stopped
    networks:
      - app-network
    depends_on:
      - loki

  node-exporter:
    image: prom/node-exporter:latest
    container_name: node-exporter
    ports:
      - "9100:9100"
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - '--path.procfs=/host/proc'
      - '--path.rootfs=/rootfs'
      - '--path.sysfs=/host/sys'
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)'
    restart: unless-stopped
    networks:
      - app-network

networks:
  app-network:
    driver: bridge

volumes:
  prometheus-data:
  grafana-data:
  loki-data:

