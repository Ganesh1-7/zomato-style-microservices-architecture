global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: zomato-clone
    replica: '{{.ExternalURL}}'

alerting:
  alertmanagers: []

rule_files: []

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'api-gateway'
    static_configs:
      - targets: ['gateway:80']
    metrics_path: '/metrics'
    scrape_interval: 10s

  - job_name: 'user-service'
    static_configs:
      - targets: ['user-service:3000']
    scrape_interval: 10s

  - job_name: 'restaurant-service'
    static_configs:
      - targets: ['restaurant-service:3000']
    scrape_interval: 10s

  - job_name: 'order-service'
    static_configs:
      - targets: ['order-service:3000']
    scrape_interval: 10s

  - job_name: 'delivery-service'
    static_configs:
      - targets: ['delivery-service:3000']
    scrape_interval: 10s

  - job_name: 'payment-service'
    static_configs:
      - targets: ['payment-service:3000']
    scrape_interval: 10s

  - job_name: 'node-exporter'
    static_configs:
      - targets: ['node-exporter:9100']
    scrape_interval: 10s

