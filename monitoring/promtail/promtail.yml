server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: docker-logs
    static_configs:
      - targets:
          - localhost
        labels:
          job: docker-logs
          __path__: /var/lib/docker/containers/*/*.log
    pipeline_stages:
      - json:
          expressions:
            output: log
            stream: stream
            attrs: attrs
            tag: attrs.tag
      - regex:
          expression: (?P<container_name>(?:[^|]|[^|]).*)
          source: tag
      - timestamp:
          format: RFC3339Nano
          source: time
      - output:
          source: output
      - labels:
          stream:
          container_name:

  - job_name: zomato-services
    static_configs:
      - targets:
          - localhost
        labels:
          job: zomato-services
          __path__: /var/lib/docker/containers/*/*.log
    pipeline_stages:
      - docker: {}
      - regex:
          expression: "^(?P<level>\\w+)\\s+(?P<timestamp>\\S+)\\s+(?P<message>.*)$"
      - labels:
          level:

