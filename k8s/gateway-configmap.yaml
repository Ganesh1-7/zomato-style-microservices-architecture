apiVersion: v1
kind: ConfigMap
metadata:
  name: gateway-nginx-config
  namespace: zomato

data:
  nginx.conf: |-
    events {
        worker_connections 1024;
    }

    http {

        types {
            text/html                             html htm shtml;
            text/css                              css;
            text/xml                              xml;
            image/gif                             gif;
            image/jpeg                            jpeg jpg;
            application/javascript                js;
            application/json                      json;
            image/png                             png;
            image/svg+xml                         svg svgz;
            application/wasm                      wasm;
            application/zip                       zip;
            font/woff                             woff;
            font/woff2                            woff2;
            font/ttf                              ttf;
            font/otf                              otf;
            application/pdf                       pdf;
            image/webp                            webp;
        }

        default_type application/octet-stream;

        log_format loki_json escape=json '{ '
            '"timestamp": "$time_iso8601", '
            '"source": "nginx", '
            '"service": "api-gateway", '
            '"level": "info", '
            '"remote_addr": "$remote_addr", '
            '"method": "$request_method", '
            '"uri": "$request_uri", '
            '"status": $status, '
            '"response_time": $request_time, '
            '"upstream": "$upstream_addr", '
            '"upstream_response_time": "$upstream_response_time" '
        '}';

        access_log /var/log/nginx/access.log loki_json;
        error_log /var/log/nginx/error.log warn;

        sendfile on;
        keepalive_timeout 65;

        gzip on;

        server {
            listen 80;
            server_name localhost;

            proxy_connect_timeout 5s;
            proxy_send_timeout 10s;
            proxy_read_timeout 10s;

            proxy_next_upstream error timeout http_500 http_502 http_503 http_504;
            proxy_next_upstream_tries 3;

            add_header 'Access-Control-Allow-Origin' '*' always;
            add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, PATCH, OPTIONS' always;
            add_header 'Access-Control-Allow-Headers' 'Content-Type, Authorization, X-User-Id' always;

            location / {
                return 404;
            }

            location /api/users/ {

                if ($request_method = 'OPTIONS') {
                    return 204;
                }

                proxy_pass http://user-service:3000/;
                proxy_set_header Host $host;
                proxy_set_header X-Real-IP $remote_addr;
            }

            location /api/restaurants/ {

                if ($request_method = 'OPTIONS') {
                    return 204;
                }

                proxy_pass http://restaurant-service:3000/api/restaurants/;
                proxy_set_header Host $host;
                proxy_set_header X-Real-IP $remote_addr;
            }

            location /api/cuisines {
                proxy_pass http://restaurant-service:3000/api/cuisines;
            }

            location /api/categories {
                proxy_pass http://restaurant-service:3000/api/categories;
            }

            location /api/cart/ {
                proxy_pass http://order-service:3000/api/cart/;
            }

            location /api/orders/ {
                proxy_pass http://order-service:3000/api/orders/;
            }

            location /api/orders {
                proxy_pass http://order-service:3000/api/orders;
            }

            location /api/deliveries/ {
                proxy_pass http://delivery-service:3000/api/deliveries/;
            }

            location /api/tracking/ {
                proxy_pass http://delivery-service:3000/api/tracking/;
            }

            location /api/payments/ {
                proxy_pass http://payment-service:3000/api/payments/;
            }

            location /api/payments {
                proxy_pass http://payment-service:3000/api/payments;
            }

            location /health {
                access_log off;

                add_header Content-Type application/json;

                return 200 '{"status":"UP","service":"api-gateway"}';
            }
        }
    }

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: frontend-nginx-config
  namespace: zomato

data:
  default.conf: |-
    server {
        listen 80;

        server_name localhost;

        root /usr/share/nginx/html;

        index index.html;

        gzip on;
        gzip_vary on;
        gzip_min_length 1024;

        gzip_types
            text/plain
            text/css
            text/xml
            text/javascript
            application/javascript
            application/json
            application/xml+rss;

        location / {
            try_files $uri $uri/ /index.html;
        }

        location /api/ {

            proxy_pass http://gateway/;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;

        }
    }