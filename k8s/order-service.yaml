apiVersion: apps/v1
kind: Deployment
metadata:
  name: order-service
  namespace: zomato
  labels:
    app: order-service

spec:
  replicas: 1

  selector:
    matchLabels:
      app: order-service

  template:
    metadata:
      labels:
        app: order-service

    spec:
      terminationGracePeriodSeconds: 30

      containers:
        - name: order-service
          image: ganesh1702/order-service:latest
          imagePullPolicy: Always

          ports:
            - containerPort: 3000
              name: http

          env:
            - name: ORDER_SERVICE_PORT
              value: "3000"
            - name: NODE_ENV
              value: "production"
            - name: SERVICE_NAME
              value: "order-service"
            - name: LOG_LEVEL
              value: "info"

          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "250m"
              memory: "256Mi"

          # 🚀 IMPORTANT: prevents early restart crashes
          startupProbe:
            httpGet:
              path: /health
              port: http
            periodSeconds: 10
            failureThreshold: 30
            timeoutSeconds: 3

          # 🔥 detects real crashes AFTER startup
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 45
            periodSeconds: 15
            timeoutSeconds: 3
            failureThreshold: 3

          # ✅ controls traffic routing
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 20
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 5

          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            runAsNonRoot: false
---
apiVersion: v1
kind: Service
metadata:
  name: order-service
  namespace: zomato

spec:
  selector:
    app: order-service

  ports:
    - port: 3000
      targetPort: 3000
      protocol: TCP

  type: ClusterIP