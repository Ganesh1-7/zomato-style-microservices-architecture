apiVersion: apps/v1
kind: Deployment
metadata:
  name: order-service
  namespace: zomato
  labels:
    app: order-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: order-service
  template:
    metadata:
      labels:
        app: order-service
    spec:
      containers:
      - name: order-service
        image: ganesh1702/order-service:latest
        imagePullPolicy: Always

        ports:
        - containerPort: 3000
        env:
        - name: ORDER_SERVICE_PORT
          value: "3000"
        - name: NODE_ENV
          value: "production"
        - name: SERVICE_NAME
          value: "order-service"
        - name: LOG_LEVEL
          value: "info"

        resources:
          requests:
            cpu: 50m
            memory: 64Mi
          limits:
            cpu: 250m
            memory: 256Mi
        livenessProbe:
          httpGet:
            path: /health
            port: 3000
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 3000
          initialDelaySeconds: 5
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: order-service
  namespace: zomato
spec:
  selector:
    app: order-service
  ports:
  - port: 3000
    targetPort: 3000
  type: ClusterIP
