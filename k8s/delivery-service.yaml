apiVersion: apps/v1
kind: Deployment
metadata:
  name: delivery-service
  namespace: zomato
  labels:
    app: delivery-service

spec:
  replicas: 1

  selector:
    matchLabels:
      app: delivery-service

  template:
    metadata:
      labels:
        app: delivery-service

    spec:
      terminationGracePeriodSeconds: 30

      containers:
        - name: delivery-service
          image: ganesh1702/delivery-service:latest
          imagePullPolicy: Always

          ports:
            - containerPort: 3000
              name: http

          env:
            - name: DELIVERY_SERVICE_PORT
              value: "3000"
            - name: NODE_ENV
              value: "production"
            - name: SERVICE_NAME
              value: "delivery-service"
            - name: LOG_LEVEL
              value: "info"

          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "250m"
              memory: "256Mi"

          # 🚀 Prevents early crash due to slow startup
          startupProbe:
            httpGet:
              path: /health
              port: http
            periodSeconds: 10
            failureThreshold: 30
            timeoutSeconds: 3

          # 🔥 Detects real runtime failure
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 45
            periodSeconds: 15
            timeoutSeconds: 3
            failureThreshold: 3

          # ✅ Controls traffic readiness properly
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 20
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 5
---
apiVersion: v1
kind: Service
metadata:
  name: delivery-service
  namespace: zomato

spec:
  selector:
    app: delivery-service

  ports:
    - port: 3000
      targetPort: 3000
      protocol: TCP

  type: ClusterIP