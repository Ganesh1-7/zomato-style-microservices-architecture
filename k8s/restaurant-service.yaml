apiVersion: apps/v1
kind: Deployment
metadata:
  name: restaurant-service
  namespace: zomato
  labels:
    app: restaurant-service

spec:
  replicas: 1

  selector:
    matchLabels:
      app: restaurant-service

  template:
    metadata:
      labels:
        app: restaurant-service

    spec:
      containers:
        - name: restaurant-service
          image: ganesh1702/restaurant-service:latest
          imagePullPolicy: Always

          ports:
            - containerPort: 3000

          env:
            - name: RESTAURANT_SERVICE_PORT
              value: "3000"
            - name: NODE_ENV
              value: "production"
            - name: SERVICE_NAME
              value: "restaurant-service"
            - name: LOG_LEVEL
              value: "info"

          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "250m"
              memory: "256Mi"

          # 🔥 CRITICAL FIX: startupProbe (missing in your version)
          startupProbe:
            httpGet:
              path: /health
              port: 3000
            periodSeconds: 10
            failureThreshold: 30

          livenessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 40
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3

          readinessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 20
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 5

---
apiVersion: v1
kind: Service
metadata:
  name: restaurant-service
  namespace: zomato

spec:
  selector:
    app: restaurant-service

  ports:
    - port: 3000
      targetPort: 3000

  type: ClusterIP