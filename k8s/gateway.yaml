apiVersion: apps/v1
kind: Deployment
metadata:
  name: gateway
  namespace: zomato
  labels:
    app: gateway
spec:
  replicas: 1
  selector:
    matchLabels:
      app: gateway
  template:
    metadata:
      labels:
        app: gateway
    spec:
      containers:
      - name: gateway
        image: ganesh1702/gateway:latest
        ports:
        - containerPort: 80
        volumeMounts:
        - name: nginx-config
          mountPath: /etc/nginx/nginx.conf
          subPath: nginx.conf
        resources:
          requests:
            cpu: 50m
            memory: 64Mi
          limits:
            cpu: 250m
            memory: 256Mi
        livenessProbe:
          httpGet:
            path: /health
            port: 80
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 80
          initialDelaySeconds: 5
          periodSeconds: 5
      volumes:
      - name: nginx-config
        configMap:
          name: gateway-nginx-config
---
apiVersion: v1
kind: Service
metadata:
  name: gateway
  namespace: zomato
spec:
  selector:
    app: gateway
  ports:
  - port: 80
    targetPort: 80
    nodePort: 30080
  type: NodePort
