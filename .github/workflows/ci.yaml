name: CICD

on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        service:
          - restaurant-service
          - order-service
          - payment-service
          - delivery-service
          - user-service

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Docker Login
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASS }}

      - name: Build Docker Image
        run: |
          docker build \
          -t ganesh1702/${{ matrix.service }}:latest \
          -f backend/services/${{ matrix.service }}/Dockerfile \
          backend/services/${{ matrix.service }}

      - name: Push Docker Image
        run: docker push ganesh1702/${{ matrix.service }}:latest