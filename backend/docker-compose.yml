version: "3.9"

services:
  user-service:
    build: ./services/user-service
    container_name: user-service
    ports:
      - "3001:3000"
    restart: unless-stopped
    environment:
      - PORT=3000
    networks:
      - app-network

  restaurant-service:
    build: ./services/restaurant-service
    container_name: restaurant-service
    ports:
      - "3002:3000"
    restart: unless-stopped
    environment:
      - PORT=3000
    networks:
      - app-network

  order-service:
    build: ./services/order-service
    container_name: order-service
    ports:
      - "3003:3000"
    restart: unless-stopped
    environment:
      - PORT=3000
    networks:
      - app-network

  delivery-service:
    build: ./services/delivery-service
    container_name: delivery-service
    ports:
      - "3004:3000"
    restart: unless-stopped
    environment:
      - PORT=3000
    networks:
      - app-network

  payment-service:
    build: ./services/payment-service
    container_name: payment-service
    ports:
      - "3005:3000"
    restart: unless-stopped
    environment:
      - PORT=3000
    networks:
      - app-network

  gateway:
    image: nginx:alpine
    container_name: api-gateway
    ports:
      - "8080:80"
    volumes:
      - ./gateway/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - user-service
      - restaurant-service
      - order-service
      - delivery-service
      - payment-service
    restart: unless-stopped
    networks:
      - app-network

  node-exporter:
    image: prom/node-exporter:latest
    container_name: node-exporter
    ports:
      - "9100:9100"
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - '--path.procfs=/host/proc'
      - '--path.rootfs=/rootfs'
      - '--path.sysfs=/host/sys'
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)'
    restart: unless-stopped
    networks:
      - app-network

networks:
  app-network:
    driver: bridge

